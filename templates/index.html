<!DOCTYPE html>
<html>
<head>
    <title>Student Result Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            padding: 10px 20px;
            background: #4facfe;
            border: none;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #00c6ff;
        }

        .result {
            margin-top: 20px;
            font-weight: bold;
        }

        .accuracy {
            font-size: 14px;
            color: gray;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎓 Student Result Predictor</h2>

    <p class="accuracy">Model Accuracy: {{ accuracy }}%</p>

    <form action="/predict" method="post">
        <input type="number" step="0.1" name="study_hours" placeholder="Study Hours" required>
        <input type="number" step="0.1" name="attendance" placeholder="Attendance (%)" required>
        <input type="number" step="0.1" name="internal_marks" placeholder="Internal Marks" required>
        <button type="submit">Predict</button>
    </form>

    {% if prediction_text %}
        <div class="result">
            Result: {{ prediction_text }} <br>
            Confidence: {{ probability }}%
        </div>
    {% endif %}

    {% if error %}
        <div class="result" style="color:red;">
            {{ error }}
        </div>
    {% endif %}
</div>

</body>
</html>
